# config.example.yaml — Night Brownie example configuration.
# Copy this file to config.yaml and fill in the values.
# All secrets must be provided as ${ENV_VAR} references — never hardcode them.

identity:
  github_token: "${GITHUB_TOKEN}"    # PAT for the bot account
  github_user: "my-bot"              # GitHub username of the bot account

llm:
  provider: anthropic                # anthropic | ollama
  model: claude-sonnet-4-6
  api_key: "${ANTHROPIC_API_KEY}"    # omit the api_key field entirely for ollama

polling:
  interval_seconds: 60               # how often to poll GitHub (seconds)

# queue:
#   db_path: null                    # defaults to ~/.agent-harness/queue.db
#   claim_timeout_seconds: 300       # seconds before a stale claimed task is re-enqueued
#   max_retries: 3                   # max re-enqueue attempts before marking a task failed
#   drain_interval_seconds: 10       # how often (seconds) the harness drains completed tasks
#   requeue_interval_seconds: 60     # how often (seconds) the harness checks for stale tasks

# containers:
#   backend: docker                  # docker (default) | podman | apple
#   # socket_url: null               # omit to use the default socket for docker/podman

# --- Docker with a custom socket ---
# containers:
#   backend: docker
#   socket_url: "unix:///var/run/docker.sock"

# --- Rootless Podman ---
# containers:
#   backend: podman
#   socket_url: "unix:///run/user/1000/podman/podman.sock"

# --- Apple Containers (macOS only) ---
# containers:
#   backend: apple

repos:
  - owner: callowayproject
    name: bump-my-version
    agents:
      - type: issue-triage
        allow_close: false           # set to true to allow the agent to close issues
        config:
          # --- Container lifecycle (recommended) ---
          # Night Brownie pulls the image (if needed), starts the container, and
          # stops it on shutdown.  Both 'image' and 'port' are required for
          # this mode.
          image: "night-brownie-issue-triage:latest"  # Docker image to run
          port: 9001                            # host port to bind container port 8000 to

          # --- Pre-running agent (alternative) ---
          # If you manage the container yourself (or point at a remote agent),
          # omit 'image'/'port' and supply 'url' instead.  Night Brownie will not
          # start or stop the container.
          # url: "http://localhost:9001"

          # --- Triage behaviour ---
          stale_days: 30
          labels:
            bug: ["crash", "exception", "error"]
            question: ["how do I", "how to"]
